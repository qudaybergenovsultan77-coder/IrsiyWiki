<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IrsiyWiki</title>
<style>
body{font-family:sans-serif;background:#f4f6f8;margin:0}
.topbar{background:#0E7C5A;color:#fff;padding:15px;font-size:20px}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
.card{background:#fff;padding:15px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
button{padding:6px 10px;border:none;border-radius:6px;background:#0E7C5A;color:#fff;cursor:pointer}
input,textarea{width:100%;padding:8px;margin:5px 0;border:1px solid #ccc;border-radius:6px}
</style>
</head>
<body>

<div class="topbar">IrsiyWiki</div>

<div class="container">
  <h3>Yangi maqola</h3>
  <input id="title" placeholder="Sarlavha">
  <textarea id="body" placeholder="Matn"></textarea>
  <button onclick="saveArticle()">Saqlash</button>

  <h3>Maqolalar</h3>
  <div class="grid" id="articles"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCb83Hs6DGVRW-5DhMnzIZ2QWSn8u8PfB4",
  authDomain: "irsiywiki.firebaseapp.com",
  projectId: "irsiywiki",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function saveArticle(){
  const title = document.getElementById("title").value;
  const body = document.getElementById("body").value;

  if(!title) return alert("Sarlavha yoz!");

  await addDoc(collection(db, "articles"), {
    title, body, date: new Date().toISOString()
  });

  document.getElementById("title").value="";
  document.getElementById("body").value="";

  loadArticles();
}

async function loadArticles(){
  const snap = await getDocs(collection(db, "articles"));
  const box = document.getElementById("articles");
  box.innerHTML="";

  snap.forEach(d=>{
    const a = d.data();
    const el = document.createElement("div");
    el.className="card";
    el.innerHTML = `
      <h4>${a.title}</h4>
      <p>${a.body}</p>
      <button onclick="del('${d.id}')">O'chirish</button>
    `;
    box.appendChild(el);
  });
}

window.del = async function(id){
  await deleteDoc(doc(db, "articles", id));
  loadArticles();
}

loadArticles();
</script>

</body>
</html>

<div id="list"></div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "irsiywiki.firebaseapp.com",
  projectId: "irsiywiki"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let arts = [];
let user = null;

// AUTH UI
function renderAuth(){
  const el = document.getElementById("authArea");
  if(user){
    el.innerHTML = `
      ${user.email}
      <button onclick="logout()">Logout</button>
    `;
  }else{
    el.innerHTML = `
      <button onclick="login()">Login</button>
    `;
  }
}

// LOGIN (demo)
async function login(){
  const email = prompt("Email");
  const pass = prompt("Parol");
  await auth.signInWithEmailAndPassword(email, pass);
}

function logout(){
  auth.signOut();
}

// AUTH STATE
auth.onAuthStateChanged(u=>{
  user = u;
  renderAuth();
  document.getElementById("adminPanel").style.display = user ? "block" : "none";
});

// LOAD
async function loadArticles(){
  const snap = await db.collection("articles").get();
  arts = [];
  snap.forEach(doc=>{
    arts.push({id: doc.id, ...doc.data()});
  });
  render();
}

// RENDER
function render(){
  const el = document.getElementById("list");
  el.innerHTML = "";

  arts.forEach(a=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${a.title}</h3>
      <p>${a.exc || ""}</p>
      ${user ? `<button onclick="editArt('${a.id}')">Edit</button>
      <button onclick="deleteArt('${a.id}')">Delete</button>` : ""}
      <div>${DOMPurify.sanitize(a.body || "")}</div>
    `;

    el.appendChild(div);
  });
}

// ADD
async function addArticle(){
  if(!user) return alert("Login qiling");

  const t = document.getElementById("title").value;
  const e = document.getElementById("exc").value;
  const b = document.getElementById("body").value;

  await db.collection("articles").add({
    title: t,
    exc: e,
    body: b,
    author: user.email,
    dt: new Date().toISOString()
  });

  loadArticles();
}

// EDIT
async function editArt(id){
  const t = prompt("Yangi title:");
  if(!t) return;

  await db.collection("articles").doc(id).update({title:t});
  loadArticles();
}

// DELETE
async function deleteArt(id){
  if(!confirm("O'chirilsinmi?")) return;

  await db.collection("articles").doc(id).delete();
  loadArticles();
}

loadArticles();
</script>

</body>
</html>
