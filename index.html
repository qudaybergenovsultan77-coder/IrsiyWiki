<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IrsiyWiki</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f3;min-height:100vh;}
.topbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:0 1.25rem;display:flex;align-items:center;gap:1rem;height:52px;position:sticky;top:0;z-index:5;}
.logo{font-size:17px;font-weight:600;color:#111;cursor:pointer;white-space:nowrap;}
.logo span{color:#1D9E75;}
.sw{flex:1;display:flex;align-items:center;background:#f5f5f3;border:1px solid #e5e5e5;border-radius:8px;padding:0 10px;gap:6px;}
.sw input{border:none;background:transparent;flex:1;font-size:13px;color:#111;outline:none;padding:7px 0;}
.nav{display:flex;gap:6px;align-items:center;}
.bs{border:1px solid #d5d5d5;background:transparent;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;color:#333;}
.bs:hover{background:#f5f5f3;}
.bg{background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;}
.av{width:30px;height:30px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#0F6E56;cursor:pointer;border:1px solid #9FE1CB;}
.layout{display:flex;min-height:calc(100vh - 52px);}
.sb{width:210px;min-width:210px;background:#fff;border-right:1px solid #e5e5e5;padding:1rem 0.75rem;flex-shrink:0;}
.sbl{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.5rem;padding:0 4px;}
.ci{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:8px;cursor:pointer;font-size:12px;color:#555;margin-bottom:1px;}
.ci:hover{background:#f5f5f3;color:#111;}
.ci.on{background:#E1F5EE;color:#0F6E56;font-weight:600;}
.cc{font-size:11px;background:#f0f0f0;border-radius:10px;padding:1px 6px;color:#888;}
.ci.on .cc{background:#9FE1CB;color:#085041;}
.ss{font-size:12px;color:#555;padding:4px 8px;display:flex;justify-content:space-between;margin-top:2px;}
.ss b{font-weight:600;color:#111;}
.main{flex:1;padding:1.25rem;overflow-y:auto;}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.pt{font-size:18px;font-weight:600;color:#111;}
.ab{background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:0.875rem;}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1rem 1.125rem;cursor:pointer;}
.card:hover{border-color:#aaa;}
.tg{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin-bottom:7px;font-weight:600;}
.tg.xromosom{background:#EEEDFE;color:#3C3489;}
.tg.monogen{background:#E1F5EE;color:#0F6E56;}
.tg.metabolik{background:#FAEEDA;color:#633806;}
.tg.multifaktorial{background:#FAECE7;color:#712B13;}
.ct{font-size:14px;font-weight:600;color:#111;margin-bottom:5px;line-height:1.4;}
.ce{font-size:12px;color:#555;line-height:1.6;margin-bottom:9px;}
.cm{display:flex;justify-content:space-between;font-size:11px;color:#888;}
.ap{display:none;}
.bc{font-size:12px;color:#888;margin-bottom:1rem;cursor:pointer;}
.bc:hover{color:#555;}
.ah{margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid #e5e5e5;}
.at{font-size:22px;font-weight:600;color:#111;margin-bottom:8px;}
.ai{display:flex;gap:12px;font-size:12px;color:#888;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.aa{display:flex;gap:6px;}
.eb{border:1px solid #d5d5d5;background:transparent;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;color:#333;}
.eb:hover{background:#f5f5f3;}
.ab2{font-size:14px;color:#111;line-height:1.8;max-width:720px;}
.ab2 h2{font-size:16px;font-weight:600;margin:1.25rem 0 0.5rem;color:#111;}
.ab2 p{margin-bottom:0.75rem;}
.ib{float:right;width:210px;background:#f8f8f6;border:1px solid #e5e5e5;border-radius:12px;padding:0.875rem;margin:0 0 1rem 1.25rem;font-size:12px;}
.ibt{font-size:13px;font-weight:600;color:#111;margin-bottom:0.625rem;text-align:center;padding-bottom:6px;border-bottom:1px solid #e5e5e5;}
.ibr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0;}
.ibr:last-child{border-bottom:none;}
.ibk{color:#888;}
.ibv{color:#111;font-weight:600;}
.ep{display:none;}
.et{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.tb{border:1px solid #e5e5e5;background:transparent;border-radius:6px;padding:4px 9px;font-size:12px;cursor:pointer;color:#555;}
.tb:hover{background:#f5f5f3;}
.ea{width:100%;min-height:260px;border:1px solid #e5e5e5;border-radius:8px;padding:12px;font-size:13px;font-family:inherit;color:#111;background:#fff;outline:none;line-height:1.8;resize:none;}
.eac{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;}
.ff{margin-bottom:0.875rem;}
.ff label{display:block;font-size:11px;color:#555;margin-bottom:3px;font-weight:500;}
.ff input,.ff select{width:100%;border:1px solid #e5e5e5;border-radius:8px;padding:7px 10px;font-size:13px;background:#f8f8f6;color:#111;outline:none;}
.ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);align-items:center;justify-content:center;z-index:20;}
.ov.open{display:flex;}
.mo{background:#fff;border-radius:12px;padding:1.5rem;width:340px;border:1px solid #e5e5e5;}
.mo h2{font-size:16px;font-weight:600;margin-bottom:1.25rem;color:#111;}
.mt{display:flex;margin-bottom:1.25rem;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden;}
.mtb{flex:1;padding:7px;text-align:center;font-size:13px;cursor:pointer;color:#555;background:transparent;border:none;}
.mtb.on{background:#1D9E75;color:#fff;}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;}
.pm{display:none;position:fixed;top:52px;right:1.25rem;background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:0.5rem;z-index:10;width:175px;}
.pm.open{display:block;}
.ph2{padding:8px 10px 10px;border-bottom:1px solid #f0f0f0;margin-bottom:4px;}
.pn{font-size:13px;font-weight:600;color:#111;}
.pem2{font-size:11px;color:#888;}
.pi{padding:6px 10px;border-radius:8px;font-size:13px;cursor:pointer;color:#555;}
.pi:hover{background:#f5f5f3;}
.pi.rd{color:#A32D2D;}
</style>
</head>
<body>
<div id="app">
<div class="topbar">
  <div class="logo" onclick="goHome()">Irsiy<span>Wiki</span></div>
  <div class="sw"><input type="text" placeholder="Kasallik qidiring..." id="si" oninput="onSrch()"></div>
  <div class="nav" id="nav">
    <button class="bs" onclick="openAuth('login')">Kirish</button>
    <button class="bg" onclick="openAuth('reg')">Ro'yxatdan o'tish</button>
  </div>
</div>
<div class="layout">
  <div class="sb">
    <div style="margin-bottom:1.25rem;">
      <div class="sbl">Kategoriyalar</div>
      <div class="ci on" onclick="fcat('all',this)">Barchasi <span class="cc" id="ca">6</span></div>
      <div class="ci" onclick="fcat('xromosom',this)">Xromosom <span class="cc">2</span></div>
      <div class="ci" onclick="fcat('monogen',this)">Monogen <span class="cc">2</span></div>
      <div class="ci" onclick="fcat('metabolik',this)">Metabolik <span class="cc">1</span></div>
      <div class="ci" onclick="fcat('multifaktorial',this)">Multifaktorial <span class="cc">1</span></div>
    </div>
    <div>
      <div class="sbl">Statistika</div>
      <div class="ss">Maqolalar <b id="sa">6</b></div>
      <div class="ss">Mualliflar <b>4</b></div>
      <div class="ss">Tahririyat <b>12</b></div>
    </div>
  </div>
  <div class="main">
    <div id="hp">
      <div class="ph">
        <div class="pt" id="pl">Barcha maqolalar</div>
        <button class="ab" onclick="newArt()">+ Maqola qo'shish</button>
      </div>
      <div class="grid" id="grid"></div>
    </div>
    <div class="ap" id="av">
      <div class="bc" onclick="goHome()">← Bosh sahifa</div>
      <div class="ah">
        <div class="at" id="avt"></div>
        <div class="ai" id="avi"></div>
        <div class="aa">
          <button class="eb" onclick="editArt()">Tahrirlash</button>
          <button class="eb">Muhokama</button>
          <button class="eb">Ulashish</button>
          <button class="eb" onclick="deleteArt(curId)" id="artDelBtn" style="color:#b33;border-color:#e5b5b5;display:none;">🗑 O'chirish</button>
        </div>
      </div>
      <div class="ab2" id="avb"></div>
    </div>
    <div class="ep" id="ed">
      <div class="bc" id="edb" onclick="cancelEd()">← Orqaga</div>
      <div class="ph"><div class="pt" id="edt">Yangi maqola</div></div>
      <div class="ff"><label>Sarlavha</label><input type="text" id="ett" placeholder="Kasallik nomi"></div>
      <div style="display:flex;gap:8px;margin-bottom:0.875rem;">
        <div style="flex:1;"><div style="font-size:11px;color:#555;margin-bottom:3px;font-weight:500;">Kategoriya</div>
        <select id="etc" style="width:100%;border:1px solid #e5e5e5;border-radius:8px;padding:7px 8px;font-size:13px;background:#f8f8f6;color:#111;outline:none;">
          <option value="xromosom">Xromosom buzilishlari</option>
          <option value="monogen">Monogen kasalliklar</option>
          <option value="metabolik">Metabolik buzilishlar</option>
          <option value="multifaktorial">Multifaktorial</option>
        </select></div>
        <div style="flex:1;"><div style="font-size:11px;color:#555;margin-bottom:3px;font-weight:500;">Qisqa tavsif</div>
        <input type="text" id="etx" style="width:100%;border:1px solid #e5e5e5;border-radius:8px;padding:7px 10px;font-size:13px;background:#f8f8f6;color:#111;outline:none;" placeholder="Bir jumlada tavsif"></div>
      </div>
      <div class="et">
        <button class="tb" onclick="document.execCommand('bold')"><b>B</b></button>
        <button class="tb" onclick="document.execCommand('italic')"><i>I</i></button>
        <button class="tb" onclick="document.execCommand('formatBlock',false,'h2')">H2</button>
        <button class="tb" onclick="document.execCommand('insertUnorderedList')">• Ro'yxat</button>
      </div>
      <div class="ea" contenteditable="true" id="ebody"></div>
      <div class="eac">
        <button class="eb" onclick="cancelEd()">Bekor qilish</button>
        <button class="bg" onclick="saveArt()">Saqlash</button>
      </div>
    </div>
  </div>
</div>
<div class="ov" id="ov">
  <div class="mo">
    <div class="mt">
      <button class="mtb on" id="tl" onclick="stab('login')">Kirish</button>
      <button class="mtb" id="tr" onclick="stab('reg')">Ro'yxatdan o'tish</button>
    </div>
    <div id="lf">
      <div class="ff"><label>Email</label><input type="email" id="le" placeholder="siz@mail.com"></div>
      <div class="ff"><label>Parol</label><input type="password" id="lp" placeholder="••••••••"></div>
    </div>
    <div id="rf" style="display:none;">
      <div class="ff"><label>Ism</label><input type="text" id="rn" placeholder="To'liq ismingiz"></div>
      <div class="ff"><label>Email</label><input type="email" id="re" placeholder="siz@mail.com"></div>
      <div class="ff"><label>Parol</label><input type="password" id="rp" placeholder="••••••••"></div>
    </div>
    <div class="mf">
      <button class="eb" onclick="closeOv()">Bekor qilish</button>
      <button class="bg" id="asub" onclick="doAuth()">Kirish</button>
    </div>
  </div>
</div>
<div class="pm" id="pm">
  <div class="ph2"><div class="pn" id="pn"></div><div class="pem2" id="pem"></div></div>
  <div class="pi">Mening maqolalarim</div>
  <div class="pi">Sozlamalar</div>
  <div class="pi rd" onclick="doLogout()">Chiqish</div>
</div>
</div>
<script>
var arts=[
  {id:1,title:"Daun sindromi",cat:"xromosom",exc:"21-xromosomaning trisomiyasi natijasida yuzaga keladigan irsiy holat. Aqliy rivojlanish kechikishi va o'ziga xos tashqi belgilar bilan tavsiflanadi.",mu:"Dr. Karimov",dt:"2025-03-10",body:'<div class="ib"><div class="ibt">Daun sindromi</div><div class="ibr"><span class="ibk">Turi</span><span class="ibv">Trisomiya 21</span></div><div class="ibr"><span class="ibk">Tarqalishi</span><span class="ibv">1:700</span></div><div class="ibr"><span class="ibk">Meros</span><span class="ibv">De novo</span></div><div class="ibr"><span class="ibk">Davolash</span><span class="ibv">Simptomatik</span></div></div><p>Daun sindromi — 21-xromosomaning qo\'shimcha nusxasi mavjud bo\'lganida yuzaga keladigan irsiy holat.</p><h2>Sabablari</h2><p>Odatda odamda 46 ta xromosom bo\'ladi. Daun sindromi esa 47 ta xromosom bilan bog\'liq — 21-xromosomaning uchta nusxasi mavjud bo\'ladi. Bu tasodifiy xato natijasida yuzaga keladi.</p><h2>Belgilari</h2><p>Yumaloq yuz, qiya ko\'zlar, kichik burun, past bo\'y, mushak tonusining pasayishi va aqliy rivojlanish kechikishi.</p><h2>Davolash</h2><p>To\'liq davolanmaydi, ammo erta aralashuv dasturlari va maxsus ta\'lim bilan bemorlar faol hayot kechirishi mumkin.</p>'},
  {id:2,title:"Klinefelter sindromi",cat:"xromosom",exc:"XXY xromosom tarkibiga ega erkaklar kasalligi. Jinsiy rivojlanish va unumdorlikka ta'sir qiladi.",mu:"Dr. Yusupova",dt:"2025-02-14",body:'<div class="ib"><div class="ibt">Klinefelter sindromi</div><div class="ibr"><span class="ibk">Xromosomlar</span><span class="ibv">47, XXY</span></div><div class="ibr"><span class="ibk">Tarqalishi</span><span class="ibv">1:650</span></div><div class="ibr"><span class="ibk">Jins</span><span class="ibv">Erkaklar</span></div></div><p>Klinefelter sindromi — erkaklarda qo\'shimcha X xromosomasining mavjudligi bilan tavsiflanadigan irsiy holat.</p><h2>Belgilari</h2><p>Uzun bo\'y, kichik moya bezi, unumdorlikning yo\'qligi va ba\'zi hollarda o\'qish qiyinchiliklari.</p><h2>Davolash</h2><p>Testosteron terapiyasi ko\'plab belgilarni kamaytiradi.</p>'},
  {id:3,title:"Kistoz fibroz",cat:"monogen",exc:"CFTR geni mutatsiyasidan kelib chiquvchi og'ir irsiy kasallik. O'pka va hazm a'zolariga ta'sir qiladi.",mu:"Dr. Rahimov",dt:"2025-01-22",body:'<div class="ib"><div class="ibt">Kistoz fibroz</div><div class="ibr"><span class="ibk">Gen</span><span class="ibv">CFTR</span></div><div class="ibr"><span class="ibk">Meros</span><span class="ibv">Retsessiv</span></div><div class="ibr"><span class="ibk">A\'zolar</span><span class="ibv">O\'pka, oshqozon</span></div></div><p>Kistoz fibroz — CFTR genidagi mutatsiya natijasida yuzaga keladigan og\'ir irsiy kasallik.</p><h2>Belgilari</h2><p>Surunkali o\'pka infeksiyalari, nafas qisilishi va hazm muammolari.</p><h2>Zamonaviy davolash</h2><p>CFTR modulatorlari kasallikning asosiy mexanizmini to\'xtatish imkonini bermoqda.</p>'},
  {id:4,title:"Huntington kasalligi",cat:"monogen",exc:"HTT genidagi mutatsiya tufayli yuzaga keladi. Nerv tizimining progressiv shikastlanishi bilan kechadi.",mu:"Dr. Toshmatova",dt:"2024-12-05",body:'<div class="ib"><div class="ibt">Huntington kasalligi</div><div class="ibr"><span class="ibk">Gen</span><span class="ibv">HTT</span></div><div class="ibr"><span class="ibk">Meros</span><span class="ibv">Dominant</span></div><div class="ibr"><span class="ibk">Boshlanishi</span><span class="ibv">30-50 yosh</span></div></div><p>Huntington kasalligi — HTT genidagi mutatsiya natijasida yuzaga keladigan progressiv neyrodegenerativ kasallik.</p><h2>Belgilari</h2><p>Ixtiyorsiz harakatlar, kognitiv pasayish va ruhiy buzilishlar.</p><h2>Meros</h2><p>Bolalarning 50% kasallikni meros olishi mumkin.</p>'},
  {id:5,title:"Fenilketonuriya",cat:"metabolik",exc:"PAH fermenti yetishmovchiligi natijasida fenilalanin aminokislotasi to'planib qoladi. Erta aniqlansa davolanadi.",mu:"Dr. Nazarov",dt:"2025-03-01",body:'<div class="ib"><div class="ibt">Fenilketonuriya</div><div class="ibr"><span class="ibk">Gen</span><span class="ibv">PAH</span></div><div class="ibr"><span class="ibk">Meros</span><span class="ibv">Retsessiv</span></div><div class="ibr"><span class="ibk">Skrining</span><span class="ibv">Tug\'ilishda</span></div></div><p>Fenilketonuriya — PAH fermentining yetishmovchiligi sababli fenilalanin to\'planib qoluvchi irsiy kasallik.</p><h2>Erta aniqlash</h2><p>Yangi tug\'ilgan chaqaloqlarda skrining o\'tkazilib, kasallik erta aniqlanadi.</p><h2>Davolash</h2><p>Fenilalanin miqdori kam maxsus parhez bilan davolanadi.</p>'},
  {id:6,title:"Qandli diabet (2-tur)",cat:"multifaktorial",exc:"Irsiy moyillik va tashqi muhit omillari birgalikda ta'sir ko'rsatadi. Dunyo bo'yicha keng tarqalgan kasallik.",mu:"Dr. Alieva",dt:"2025-03-18",body:'<div class="ib"><div class="ibt">Qandli diabet 2-tur</div><div class="ibr"><span class="ibk">Turi</span><span class="ibv">Multifaktorial</span></div><div class="ibr"><span class="ibk">Tarqalishi</span><span class="ibv">Jahonda 10%+</span></div><div class="ibr"><span class="ibk">Yosh</span><span class="ibv">Odatda 40+</span></div></div><p>2-tur qandli diabet — insulin sekretsiyasi va ta\'sirining buzilishi bilan tavsiflanadigan metabolik kasallik.</p><h2>Irsiy komponent</h2><p>Ota-onasida diabet bo\'lganlarning kasallik rivojlanish xavfi 2-3 barobar yuqori.</p><h2>Profilaktika</h2><p>Sog\'lom turmush tarzi kasallikning oldini olishi mumkin.</p>'}
];
var cl={xromosom:"Xromosom",monogen:"Monogen",metabolik:"Metabolik",multifaktorial:"Multifaktorial"};
var curCat="all",curSrch="",curId=null,edId=null,usr=null,am="login";
function pg(id){["hp","av","ed"].forEach(function(p){document.getElementById(p).style.display=p===id?"block":"none";});}
function goHome(){pg("hp");curId=null;render();}
function render(){
  var g=document.getElementById("grid");
  var list=arts.filter(function(a){return(curCat==="all"||a.cat===curCat)&&(!curSrch||a.title.toLowerCase().indexOf(curSrch.toLowerCase())>=0||a.exc.toLowerCase().indexOf(curSrch.toLowerCase())>=0);});
  document.getElementById("ca").textContent=arts.length;
  document.getElementById("sa").textContent=arts.length;
  if(!list.length){g.innerHTML='<div style="color:#888;font-size:13px;padding:2rem 0;">Hech narsa topilmadi.</div>';return;}
  g.innerHTML=list.map(function(a){var del=canDelete(a)?'<button onclick="event.stopPropagation();deleteArt('+a.id+')" style="background:none;border:none;cursor:pointer;color:#b33;font-size:13px;padding:0;" title="O\'chirish">&#128465;</button>':"";return'<div class="card"><div onclick="openArt('+a.id+')" style="cursor:pointer"><span class="tg '+a.cat+'">'+cl[a.cat]+'</span><div class="ct">'+a.title+'</div><div class="ce">'+a.exc+'</div></div><div class="cm"><span>'+a.mu+'</span><div style="display:flex;gap:8px;align-items:center"><span>'+a.dt+'</span>'+del+'</div></div></div>';}).join("");
}
function openArt(id){
  var a=arts.find(function(x){return x.id===id;});if(!a)return;
  curId=id;
  document.getElementById("avt").textContent=a.title;
  document.getElementById("avi").innerHTML='<span class="tg '+a.cat+'">'+cl[a.cat]+'</span><span>Muallif: '+a.mu+'</span><span>'+a.dt+'</span>';
  document.getElementById("avb").innerHTML=a.body;
  var delBtn=document.getElementById("artDelBtn");
  if(delBtn)delBtn.style.display=canDelete(a)?"inline-block":"none";
  pg("av");window.scrollTo(0,0);
}
function editArt(){if(!usr){openAuth("login");return;}var a=arts.find(function(x){return x.id===curId;});if(!a)return;edId=curId;document.getElementById("edt").textContent="Maqolani tahrirlash";document.getElementById("ett").value=a.title;document.getElementById("etc").value=a.cat;document.getElementById("etx").value=a.exc;document.getElementById("ebody").innerHTML=a.body;document.getElementById("edb").textContent="← "+a.title;pg("ed");window.scrollTo(0,0);}
function newArt(){if(!usr){openAuth("login");return;}edId=null;document.getElementById("edt").textContent="Yangi maqola";document.getElementById("ett").value="";document.getElementById("etc").value="xromosom";document.getElementById("etx").value="";document.getElementById("ebody").innerHTML="";document.getElementById("edb").textContent="← Orqaga";pg("ed");window.scrollTo(0,0);}
function cancelEd(){if(edId)openArt(edId);else goHome();}
function canDelete(a){
  if(!usr)return false;
  if(usr.isAdmin)return true;
  return a.mu===usr.name;
}
function deleteArt(id){
  if(!usr){openAuth("login");return;}
  var a=arts.find(function(x){return x.id===id;});
  if(!a)return;
  if(!canDelete(a)){alert("Faqat maqola muallifi yoki admin o'chira oladi.");return;}
  if(!confirm('"'+a.title+'" maqolasini o\'chirishni xohlaysizmi?'))return;
  arts=arts.filter(function(x){return x.id!==id;});
  goHome();
}
function saveArt(){
  var t=document.getElementById("ett").value.trim(),c=document.getElementById("etc").value,x=document.getElementById("etx").value.trim(),b=document.getElementById("ebody").innerHTML;
  if(!t){alert("Sarlavha kiriting");return;}
  var d=new Date().toISOString().slice(0,10);
  if(edId){var a=arts.find(function(x){return x.id===edId;});if(a){a.title=t;a.cat=c;a.exc=x;a.body=b;a.dt=d;}openArt(edId);}
  else{var ni=Math.max.apply(null,arts.map(function(a){return a.id;}))+1;arts.push({id:ni,title:t,cat:c,exc:x,body:b,mu:usr?usr.name:"Noma'lum",dt:d});goHome();}
}
function fcat(cat,el){curCat=cat;document.querySelectorAll(".ci").forEach(function(i){i.classList.remove("on");});el.classList.add("on");var L={all:"Barcha maqolalar",xromosom:"Xromosom buzilishlari",monogen:"Monogen kasalliklar",metabolik:"Metabolik buzilishlar",multifaktorial:"Multifaktorial kasalliklar"};document.getElementById("pl").textContent=L[cat]||"Maqolalar";if(document.getElementById("hp").style.display!=="none")render();}
function onSrch(){curSrch=document.getElementById("si").value;goHome();}
function openAuth(mode){am=mode;stab(mode);document.getElementById("ov").classList.add("open");}
function closeOv(){document.getElementById("ov").classList.remove("open");}
function stab(t){am=t;document.getElementById("lf").style.display=t==="login"?"block":"none";document.getElementById("rf").style.display=t==="reg"?"block":"none";document.getElementById("tl").className="mtb"+(t==="login"?" on":"");document.getElementById("tr").className="mtb"+(t==="reg"?" on":"");document.getElementById("asub").textContent=t==="login"?"Kirish":"Ro'yxatdan o'tish";}
function doAuth(){
  var name,email;
  if(am==="reg"){name=document.getElementById("rn").value.trim();email=document.getElementById("re").value.trim();if(!name||!email){alert("Barcha maydonlarni to'ldiring");return;}}
  else{email=document.getElementById("le").value.trim();if(!email){alert("Email kiriting");return;}name=email.split("@")[0];name=name.charAt(0).toUpperCase()+name.slice(1);}
  usr={name:name,email:email,isAdmin:email==="admin@irsiy.uz"};closeOv();
  var ini=usr.name.split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();
  document.getElementById("nav").innerHTML='<div class="av" onclick="togPM()">'+ini+'</div>';
  document.getElementById("pn").textContent=usr.name;document.getElementById("pem").textContent=usr.email;
}
function togPM(){document.getElementById("pm").classList.toggle("open");}
function doLogout(){usr=null;document.getElementById("pm").classList.remove("open");document.getElementById("nav").innerHTML='<button class="bs" onclick="openAuth(\'login\')">Kirish</button><button class="bg" onclick="openAuth(\'reg\')">Ro\'yxatdan o\'tish</button>';goHome();}
document.addEventListener("click",function(e){var m=document.getElementById("pm");if(m&&!e.target.closest(".av")&&!e.target.closest(".pm"))m.classList.remove("open");});
render();
</script>
