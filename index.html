<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IrsiyWiki Pro</title>

<!-- Firebase + Auth + DOMPurify -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

<style>
body{font-family:sans-serif;background:#f5f5f5;padding:20px}
.top{display:flex;justify-content:space-between;align-items:center}
.card{background:#fff;padding:15px;margin:10px;border-radius:10px}
button{padding:6px 10px;margin:5px}
input,textarea{padding:6px;margin:5px;width:100%}
.admin{background:#ffe0e0;padding:10px;margin:10px;border-radius:10px}
</style>
</head>
<body>

<div class="top">
<h2>IrsiyWiki Pro</h2>
<div id="authArea"></div>
</div>

<div id="adminPanel" class="admin" style="display:none;">
<h3>Admin Panel</h3>
<input id="title" placeholder="Title">
<input id="exc" placeholder="Qisqa tavsif">
<textarea id="body" placeholder="HTML content"></textarea>
<button onclick="addArticle()">Saqlash</button>
</div>

<div id="list"></div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "irsiywiki.firebaseapp.com",
  projectId: "irsiywiki"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let arts = [];
let user = null;

// AUTH UI
function renderAuth(){
  const el = document.getElementById("authArea");
  if(user){
    el.innerHTML = `
      ${user.email}
      <button onclick="logout()">Logout</button>
    `;
  }else{
    el.innerHTML = `
      <button onclick="login()">Login</button>
    `;
  }
}

// LOGIN (demo)
async function login(){
  const email = prompt("Email");
  const pass = prompt("Parol");
  await auth.signInWithEmailAndPassword(email, pass);
}

function logout(){
  auth.signOut();
}

// AUTH STATE
auth.onAuthStateChanged(u=>{
  user = u;
  renderAuth();
  document.getElementById("adminPanel").style.display = user ? "block" : "none";
});

// LOAD
async function loadArticles(){
  const snap = await db.collection("articles").get();
  arts = [];
  snap.forEach(doc=>{
    arts.push({id: doc.id, ...doc.data()});
  });
  render();
}

// RENDER
function render(){
  const el = document.getElementById("list");
  el.innerHTML = "";

  arts.forEach(a=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${a.title}</h3>
      <p>${a.exc || ""}</p>
      ${user ? `<button onclick="editArt('${a.id}')">Edit</button>
      <button onclick="deleteArt('${a.id}')">Delete</button>` : ""}
      <div>${DOMPurify.sanitize(a.body || "")}</div>
    `;

    el.appendChild(div);
  });
}

// ADD
async function addArticle(){
  if(!user) return alert("Login qiling");

  const t = document.getElementById("title").value;
  const e = document.getElementById("exc").value;
  const b = document.getElementById("body").value;

  await db.collection("articles").add({
    title: t,
    exc: e,
    body: b,
    author: user.email,
    dt: new Date().toISOString()
  });

  loadArticles();
}

// EDIT
async function editArt(id){
  const t = prompt("Yangi title:");
  if(!t) return;

  await db.collection("articles").doc(id).update({title:t});
  loadArticles();
}

// DELETE
async function deleteArt(id){
  if(!confirm("O'chirilsinmi?")) return;

  await db.collection("articles").doc(id).delete();
  loadArticles();
}

loadArticles();
</script>

</body>
</html>
